<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #34a853;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #34a853;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      outline: none;
    }
    select:focus, input:focus {
      border-color: #34a853;
      box-shadow: 0 0 0 2px rgba(52,168,83,0.15);
    }
    select option:disabled { color: #aaa; }
    .preview-box {
      background: #f8f9fa;
      border: 1px solid #e8eaed;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #5f6368;
      min-height: 60px;
      margin-bottom: 14px;
    }
    .preview-box strong { color: #202124; display: block; margin-bottom: 4px; }
    .semana-chip {
      display: inline-block;
      background: #e8f5e9;
      color: #1e7e34;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      margin: 2px 2px 2px 0;
      border: 1px solid #a5d6a7;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-create { background: #34a853; color: #fff; }
    .btn-create:hover { background: #2d9248; }
    .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .msg.ok  { background: #e6f4ea; color: #137333; border: 1px solid #34a853; }
    .msg.err { background: #fce8e6; color: #c5221f; border: 1px solid #ea4335; }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>Crear Nuevo Mes</h2>

  <div class="field">
    <label>Mes</label>
    <select id="mes" onchange="actualizarPreview()">
      <option value="">Cargando...</option>
    </select>
  </div>

  <div class="field">
    <label>Año</label>
    <input type="number" id="year" min="2024" max="2035" onchange="actualizarPreview()">
  </div>

  <div class="field">
    <label>Vista previa de semanas</label>
    <div class="preview-box" id="preview">
      Selecciona un mes para ver las semanas que se generarán.
    </div>
  </div>

  <button class="btn btn-create" id="btnCrear" onclick="crear()">
    <span class="spinner" id="spinner"></span>
    Crear Mes
  </button>

  <div class="msg" id="msgBox"></div>

  <script>
    const MESES_NOMBRES = {
      'ENERO':'Enero','FEBRERO':'Febrero','MARZO':'Marzo','ABRIL':'Abril',
      'MAYO':'Mayo','JUNIO':'Junio','JULIO':'Julio','AGOSTO':'Agosto',
      'SEPTIEMBRE':'Septiembre','OCTUBRE':'Octubre','NOVIEMBRE':'Noviembre','DICIEMBRE':'Diciembre'
    };
    const MESES_IDX = {
      'ENERO':0,'FEBRERO':1,'MARZO':2,'ABRIL':3,'MAYO':4,'JUNIO':5,
      'JULIO':6,'AGOSTO':7,'SEPTIEMBRE':8,'OCTUBRE':9,'NOVIEMBRE':10,'DICIEMBRE':11
    };

    let datosIniciales = null;

    google.script.run
      .withSuccessHandler(init)
      .withFailureHandler(e => mostrarMsg('Error al cargar: ' + e.message, false))
      .obtenerDatosCrearMes();

    function init(datos) {
      datosIniciales = datos;
      const sel = document.getElementById('mes');
      sel.innerHTML = '<option value="">— Selecciona mes —</option>';

      datos.meses.forEach(m => {
        const o = document.createElement('option');
        o.value = m;
        const existe = datos.existentes.includes(m);
        o.textContent = MESES_NOMBRES[m] + (existe ? ' (ya existe)' : '');
        o.disabled = existe;
        sel.appendChild(o);
      });

      document.getElementById('year').value = datos.year;
    }

    function calcularSemanasJS(mesIdx, year) {
      const primerDia       = new Date(year, mesIdx, 1);
      const ultimoDia       = new Date(year, mesIdx + 1, 0).getDate();
      const diaSemanaInicio = primerDia.getDay(); // 0=Dom,1=Lun,...
      const primerDomingo   = diaSemanaInicio === 0 ? 1 : (8 - diaSemanaInicio);

      const semanas = [];
      let inicio = 1;
      let fin    = Math.min(primerDomingo, ultimoDia);
      semanas.push(`Semana del ${inicio} al ${fin}`);
      inicio = fin + 1;
      while (inicio <= ultimoDia) {
        fin = Math.min(inicio + 6, ultimoDia);
        semanas.push(`Semana del ${inicio} al ${fin}`);
        inicio = fin + 1;
      }
      return semanas;
    }

    function actualizarPreview() {
      const mes  = document.getElementById('mes').value;
      const year = parseInt(document.getElementById('year').value);
      const prev = document.getElementById('preview');

      if (!mes || !year) {
        prev.innerHTML = 'Selecciona un mes para ver las semanas que se generarán.';
        return;
      }

      const semanas = calcularSemanasJS(MESES_IDX[mes], year);
      prev.innerHTML = `<strong>${MESES_NOMBRES[mes]} ${year} — ${semanas.length} semana(s):</strong>` +
        semanas.map(s => `<span class="semana-chip">${s}</span>`).join('');
    }

    function crear() {
      const mes  = document.getElementById('mes').value;
      const year = document.getElementById('year').value;
      if (!mes) { mostrarMsg('Selecciona un mes.', false); return; }
      if (!year) { mostrarMsg('Ingresa el año.', false); return; }

      setLoading(true);
      google.script.run
        .withSuccessHandler(res => {
          setLoading(false);
          if (res.ok) {
            mostrarMsg('Mes creado correctamente. Recarga la página para verlo.', true);
            // Mark as existing in the dropdown
            const opt = document.querySelector(`#mes option[value="${mes}"]`);
            if (opt) { opt.disabled = true; opt.textContent += ' (ya existe)'; }
            document.getElementById('mes').value = '';
            document.getElementById('preview').innerHTML =
              'Selecciona un mes para ver las semanas que se generarán.';
          } else {
            mostrarMsg('Error: ' + res.msg, false);
          }
        })
        .withFailureHandler(e => {
          setLoading(false);
          mostrarMsg('Error inesperado: ' + e.message, false);
        })
        .crearMes({ mes, year });
    }

    function setLoading(v) {
      document.getElementById('btnCrear').disabled = v;
      document.getElementById('spinner').style.display = v ? 'inline-block' : 'none';
    }

    function mostrarMsg(texto, ok) {
      const el = document.getElementById('msgBox');
      el.textContent = texto;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.style.display = 'block';
    }
  </script>
</body>
</html>
