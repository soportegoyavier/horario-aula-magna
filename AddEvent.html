<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a73e8;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1a73e8;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    select, input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      color: #202124;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }
    select:focus, input:focus, textarea:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    textarea { resize: vertical; min-height: 60px; }
    .row2 { display: flex; gap: 8px; }
    .row2 .field { flex: 1; }
    .categoria-opciones {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .categoria-opcion {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .categoria-opcion input[type="radio"] { display: none; }
    .categoria-opcion.seleccionado { border-color: #202124; }
    .cat-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .msg.ok   { background: #e6f4ea; color: #137333; border: 1px solid #34a853; }
    .msg.err  { background: #fce8e6; color: #c5221f; border: 1px solid #ea4335; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 14px 0; }
  </style>
</head>
<body>
  <h2>Agregar Evento</h2>

  <div class="row2">
    <div class="field">
      <label>Mes</label>
      <select id="mes" onchange="cargarSemanas()">
        <option value="">Cargando...</option>
      </select>
    </div>
    <div class="field">
      <label>Semana</label>
      <select id="semana">
        <option value="">— Selecciona mes —</option>
      </select>
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Día</label>
      <select id="dia"></select>
    </div>
  </div>

  <div class="row2">
    <div class="field">
      <label>Hora inicio</label>
      <select id="horaInicio" onchange="filtrarHoraFin()"></select>
    </div>
    <div class="field">
      <label>Hora fin</label>
      <select id="horaFin"></select>
    </div>
  </div>

  <hr class="divider">

  <div class="field">
    <label>Nombre del evento *</label>
    <input type="text" id="nombre" placeholder="Ej: Conferencia de bienvenida">
  </div>

  <div class="field">
    <label>Responsable / Organizador</label>
    <input type="text" id="responsable" placeholder="Nombre o dependencia">
  </div>

  <div class="field">
    <label>Observaciones / Notas</label>
    <textarea id="notas" placeholder="Requerimientos técnicos, sonido, etc."></textarea>
  </div>

  <hr class="divider">

  <div class="field">
    <label>Categoría</label>
    <div class="categoria-opciones" id="categorias"></div>
  </div>

  <button class="btn btn-primary" onclick="enviar()" id="btnGuardar">
    <span class="spinner" id="spinner"></span>
    Guardar Evento
  </button>

  <div class="msg" id="msgBox"></div>

  <script>
    const COLORES_BG = {
      'Ensayo':             '#B3D9FF',
      'Evento/Conferencia': '#FFD9B3',
      'Ceremonia':          '#E8D5FF',
      'Clase/Taller':       '#B3FFD9'
    };

    let todasHoras = [];
    let categoriaSeleccionada = '';

    google.script.run
      .withSuccessHandler(inicializar)
      .withFailureHandler(e => mostrarMsg('Error al cargar datos: ' + e.message, false))
      .obtenerDatosIniciales();

    function inicializar(datos) {
      todasHoras = datos.horas;

      // Meses
      const selMes = document.getElementById('mes');
      selMes.innerHTML = '<option value="">— Selecciona mes —</option>';
      datos.meses.forEach(m => {
        const o = document.createElement('option');
        o.value = m; o.textContent = m;
        selMes.appendChild(o);
      });

      // Días
      const selDia = document.getElementById('dia');
      datos.dias.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        selDia.appendChild(o);
      });

      // Horas
      poblarHoras();

      // Categorías
      const contenedor = document.getElementById('categorias');
      datos.categorias.forEach((cat, idx) => {
        const div = document.createElement('div');
        div.className = 'categoria-opcion';
        div.style.background = COLORES_BG[cat] || '#f5f5f5';
        div.setAttribute('data-cat', cat);
        div.innerHTML = `
          <span class="cat-dot" style="background:${COLORES_BG[cat]};border:2px solid rgba(0,0,0,0.2)"></span>
          <span>${cat}</span>
        `;
        div.onclick = () => seleccionarCategoria(cat);
        if (idx === 0) { seleccionarCategoria(cat); div.classList.add('seleccionado'); }
        contenedor.appendChild(div);
      });
    }

    function poblarHoras() {
      const ini = document.getElementById('horaInicio');
      const fin = document.getElementById('horaFin');
      ini.innerHTML = '';
      fin.innerHTML = '';
      todasHoras.forEach(h => {
        ini.innerHTML += `<option value="${h}">${h}</option>`;
        fin.innerHTML += `<option value="${h}">${h}</option>`;
      });
      filtrarHoraFin();
    }

    function filtrarHoraFin() {
      const ini = document.getElementById('horaInicio').value;
      const finSel = document.getElementById('horaFin');
      const idxIni = todasHoras.indexOf(ini);
      finSel.innerHTML = '';
      todasHoras.slice(idxIni).forEach(h => {
        finSel.innerHTML += `<option value="${h}">${h}</option>`;
      });
    }

    function seleccionarCategoria(cat) {
      categoriaSeleccionada = cat;
      document.querySelectorAll('.categoria-opcion').forEach(el => {
        el.classList.toggle('seleccionado', el.getAttribute('data-cat') === cat);
      });
    }

    function cargarSemanas() {
      const mes = document.getElementById('mes').value;
      const selSemana = document.getElementById('semana');
      selSemana.innerHTML = '<option>Cargando...</option>';
      if (!mes) return;
      google.script.run
        .withSuccessHandler(semanas => {
          selSemana.innerHTML = '<option value="">— Selecciona semana —</option>';
          semanas.forEach(s => {
            const o = document.createElement('option');
            o.value = s.indice; o.textContent = s.label;
            selSemana.appendChild(o);
          });
        })
        .obtenerSemanasDeMes(mes);
    }

    function enviar() {
      const nombre = document.getElementById('nombre').value.trim();
      if (!nombre) { mostrarMsg('El nombre del evento es obligatorio.', false); return; }
      if (!document.getElementById('mes').value) { mostrarMsg('Selecciona un mes.', false); return; }
      if (document.getElementById('semana').value === '') { mostrarMsg('Selecciona una semana.', false); return; }
      if (!categoriaSeleccionada) { mostrarMsg('Selecciona una categoría.', false); return; }

      const datos = {
        mes:           document.getElementById('mes').value,
        indiceSemana:  parseInt(document.getElementById('semana').value),
        dia:           document.getElementById('dia').value,
        horaInicio:    document.getElementById('horaInicio').value,
        horaFin:       document.getElementById('horaFin').value,
        nombre:        nombre,
        responsable:   document.getElementById('responsable').value.trim(),
        notas:         document.getElementById('notas').value.trim(),
        categoria:     categoriaSeleccionada
      };

      setLoading(true);
      google.script.run
        .withSuccessHandler(res => {
          setLoading(false);
          if (res.ok) {
            mostrarMsg('Evento guardado correctamente.', true);
            document.getElementById('nombre').value = '';
            document.getElementById('responsable').value = '';
            document.getElementById('notas').value = '';
          } else {
            mostrarMsg('Error: ' + res.msg, false);
          }
        })
        .withFailureHandler(e => {
          setLoading(false);
          mostrarMsg('Error inesperado: ' + e.message, false);
        })
        .agregarEvento(datos);
    }

    function setLoading(v) {
      document.getElementById('btnGuardar').disabled = v;
      document.getElementById('spinner').style.display = v ? 'inline-block' : 'none';
    }

    function mostrarMsg(texto, ok) {
      const el = document.getElementById('msgBox');
      el.textContent = texto;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.style.display = 'block';
      if (ok) setTimeout(() => el.style.display = 'none', 4000);
    }
  </script>
</body>
</html>
